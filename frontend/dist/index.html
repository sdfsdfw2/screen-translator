<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jietu OCR</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-solid: #F9FAFB;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: transparent; overflow: hidden;
            color: var(--text-main);
        }

        /* --------------------------
           通用的实色面板样式
        -------------------------- */
        .glass-panel {
            background: var(--bg-solid);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
        }

        /* --------------------------
           悬浮窗视图 (60x60) -> 3D 球体
        -------------------------- */
        #floating-view {
            display: flex; justify-content: center; align-items: center;
            height: calc(100vh - 2px); width: calc(100vw - 2px);
            margin: 1px;
            /* 实色 3D 球体渐变与高光效果 */
            background: radial-gradient(circle at 35% 25%, #FFFFFF, #6366F1 45%, #312E81 90%);
            color: white; cursor: grab;
            --wails-draggable: drag; user-select: none; 
            border-radius: 50%;
            /* 边缘反光与内阴影营造立体感，移除所有外阴影防止窗口裁切成方形 */
            box-shadow: inset -6px -6px 14px rgba(0, 0, 0, 0.4), 
                        inset 6px 6px 14px rgba(255, 255, 255, 0.7);
        }
        #floating-view:hover {
            /* 只改变光泽和投影，不使用 transform 避免 Linux WebKit 边框丢失变矩形 */
            background: radial-gradient(circle at 40% 30%, #FFFFFF, #818CF8 45%, #312E81 90%);
            box-shadow: inset -6px -6px 14px rgba(0, 0, 0, 0.5), 
                        inset 6px 6px 14px rgba(255, 255, 255, 0.9);
        }
        #floating-view:active { 
            cursor: grabbing; 
            box-shadow: inset -3px -3px 8px rgba(0, 0, 0, 0.6), 
                        inset 3px 3px 8px rgba(255, 255, 255, 0.3);
        }
        #floating-view.processing { 
            /* 处理中时变为醒目的实色琥珀色，为防止 WebKit 渲染 Bug，移除所有 animation */
            background: radial-gradient(circle at 35% 25%, #FFFFFF, #F59E0B 45%, #B45309 90%);
            box-shadow: inset -6px -6px 14px rgba(0,0,0,0.4), inset 6px 6px 14px rgba(255,255,255,0.7);
        }

        #floating-icon { width: 24px; height: 24px; fill: currentColor; }

        /* --------------------------
           右键菜单层
        -------------------------- */
        #context-menu {
            display: none; height: 100vh; width: 100vw; 
            flex-direction: column; justify-content: center;
            padding: 8px; box-sizing: border-box; border-radius: 16px;
        }
        .menu-item {
            padding: 12px 14px; cursor: pointer; border-radius: 10px;
            font-size: 14px; font-weight: 500; transition: background 0.2s, color 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .menu-item:hover { background: rgba(0,0,0,0.06); }
        .menu-item.danger { color: #EF4444; }
        .menu-item.danger:hover { background: #FEF2F2; }

        /* --------------------------
           设置视图
        -------------------------- */
        #settings-view {
            display: none; height: calc(100vh - 16px); width: calc(100vw - 16px); 
            margin: 8px; padding: 24px; box-sizing: border-box; flex-direction: column;
            --wails-draggable: drag; overflow-y: auto;
        }
        h3 { margin-top: 0; margin-bottom: 24px; font-size: 20px; font-weight: 600; color: #111827; display: flex; align-items: center; gap: 8px;}
        .setting-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .setting-row label { font-size: 14px; font-weight: 500; color: #374151; }
        .setting-row select, .setting-row input { 
            width: 55%; padding: 8px 12px; border: 1px solid var(--border-color); 
            border-radius: 10px; font-size: 14px; background: #FFFFFF;
            outline: none; transition: all 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        .setting-row select:focus, .setting-row input:focus { 
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); 
        }

        #bing-config {
            display: none; background: #F3F4F6; border-radius: 12px; 
            padding: 16px; margin-bottom: 16px; border: 1px solid var(--border-color);
        }

        /* --------------------------
           结果视图 (550x350)
        -------------------------- */
        #result-view {
            display: none; height: calc(100vh - 16px); width: calc(100vw - 16px); 
            margin: 8px; padding: 20px; box-sizing: border-box; flex-direction: column;
            --wails-draggable: drag;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header h2 { margin: 0; font-size: 18px; font-weight: 600; color: #111827; }
        
        .content-area { display: flex; gap: 16px; flex-grow: 1; }
        .text-box { 
            flex: 1; display: flex; flex-direction: column; background: #FFFFFF; 
            border-radius: 14px; border: 1px solid var(--border-color); padding: 14px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .text-box label { 
            font-size: 12px; font-weight: 600; color: var(--text-muted); 
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .text-box textarea { 
            flex-grow: 1; resize: none; padding: 0; font-family: inherit; font-size: 15px; line-height: 1.6;
            border: none; background: transparent; color: var(--text-main); outline: none;
        }

        /* --------------------------
           按钮与控件
        -------------------------- */
        .btn {
            padding: 8px 16px; cursor: pointer; border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); 
            color: white; box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3); 
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(79, 70, 229, 0.4); }
        .btn-primary:active { transform: translateY(1px); }
        
        .btn-secondary { background: white; color: var(--text-main); border: 1px solid var(--border-color); box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        .btn-secondary:hover { background: #F9FAFB; border-color: #D1D5DB; }
        
        .footer-buttons { margin-top: auto; text-align: right; }
        
        svg.icon { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

    <!-- 悬浮窗视图 -->
    <div id="floating-view" onclick="handleFloatingClick()" oncontextmenu="showContextMenu(event)" title="单机：截图翻译 | 双击：文本翻译 | 右键：菜单">
        <!-- 一个漂亮的相机/截图 SVG 图标替代 A -->
        <svg id="floating-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 3L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2h-3.17L15 3H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"/>
        </svg>
    </div>

    <!-- 右键上下文菜单 -->
    <div id="context-menu" class="glass-panel">
        <div class="menu-item" onclick="openSettings()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            偏好设置
        </div>
        <div class="menu-item danger" onclick="window.runtime.Quit()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
            彻底退出
        </div>
        <div class="menu-item" onclick="closeContextMenu()" style="justify-content:center; color: var(--text-muted); margin-top: 4px;">取消</div>
    </div>

    <!-- 设置视图 -->
    <div id="settings-view" class="glass-panel">
        <h3>
            <svg class="icon" style="width:20px;height:20px" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            截图翻译设置
        </h3>
        <div class="setting-row">
            <label>翻译引擎</label>
            <select id="translator-service" onchange="toggleConfig()">
                <option value="Google Translate">Google 翻译 (免费)</option>
                <option value="OpenAI">AI 大模型 (OpenAI兼容)</option>
                <option value="DeepL">DeepL 翻译</option>
                <option value="Microsoft Bing">微软 Bing 翻译</option>
            </select>
        </div>
        <div class="setting-row">
            <label>OCR 识别语言</label>
            <select id="ocr-lang-setting">
                <option value="eng">英语 (English)</option>
                <option value="chi_sim">简体中文 (Chinese)</option>
            </select>
        </div>
        <div class="setting-row">
            <label>目标翻译语言</label>
            <select id="target-lang-setting">
                <option value="zh-CN">简体中文 (Chinese)</option>
                <option value="en">英语 (English)</option>
            </select>
        </div>
        
        <div id="bing-config">
            <div class="setting-row">
                <label>Bing Key</label>
                <input type="password" id="bing-key" placeholder="输入您的 Azure 密钥">
            </div>
            <div class="setting-row">
                <label>Bing Region</label>
                <input type="text" id="bing-region" placeholder="例如: global, eastus">
            </div>
        </div>

        <div id="openai-config" style="display:none; background: #F3F4F6; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border-color);">
            <div class="setting-row">
                <label>接口地址</label>
                <input type="text" id="openai-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
            </div>
            <div class="setting-row">
                <label>API Key</label>
                <input type="password" id="openai-key" placeholder="sk-...">
            </div>
            <div class="setting-row">
                <label>模型名称</label>
                <input type="text" id="openai-model" placeholder="gpt-3.5-turbo">
            </div>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-primary" onclick="saveSettingsAndClose()">
                保存并关闭
            </button>
        </div>
    </div>

    <!-- 结果视图 -->
    <div id="result-view" class="glass-panel">
        <div class="header">
            <h2 id="window-title">翻译结果</h2>
            <div style="display:flex; gap:8px;">
                <button id="btn-translate-text" class="btn btn-primary" onclick="doTextTranslation()" style="display:none;">
                    翻译文本
                </button>
                <button class="btn btn-secondary" onclick="closeResultView()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    关闭
                </button>
            </div>
        </div>
        <div class="content-area">
            <div class="text-box">
                <label>识别原文</label>
                <textarea id="original-text" readonly></textarea>
            </div>
            <div class="text-box">
                <label>翻译结果</label>
                <textarea id="translated-text" readonly></textarea>
            </div>
        </div>
    </div>

<script>
    const floatingView = document.getElementById('floating-view');
    const contextMenu = document.getElementById('context-menu');
    const settingsView = document.getElementById('settings-view');
    const resultView = document.getElementById('result-view');
    const originalText = document.getElementById('original-text');
    const translatedText = document.getElementById('translated-text');
    const windowTitle = document.getElementById('window-title');
    
    let currentTranslator = "Google Translate";
    let currentOcrLang = "eng";
    let currentTargetLang = "zh-CN";

    let openaiEndpoint = "https://api.openai.com/v1/chat/completions";
    let openaiKey = "";
    let openaiModel = "gpt-3.5-turbo";

    let clickTimer = null;

    function handleFloatingClick() {
        if (clickTimer === null) {
            clickTimer = setTimeout(() => {
                clickTimer = null;
                startProcess(); // 单击：截图翻译
            }, 250);
        } else {
            clearTimeout(clickTimer);
            clickTimer = null;
            openTextTranslator(); // 双击：文本翻译
        }
    }

    // 页面加载时自动从本地文件系统恢复配置
    window.onload = async () => {
        try {
            const saved = await window.go.backend.App.LoadConfig();
            if (saved && saved !== "{}") {
                const config = JSON.parse(saved);
                currentTranslator = config.translator || "Google Translate";
                currentOcrLang = config.ocrLang || "eng";
                currentTargetLang = config.targetLang || "zh-CN";
                openaiEndpoint = config.openaiEndpoint || "https://api.openai.com/v1/chat/completions";
                openaiKey = config.openaiKey || "";
                openaiModel = config.openaiModel || "gpt-3.5-turbo";
            }
        } catch (e) {
            console.error("加载配置失败", e);
        }

        // 监听来自系统托盘的事件
        window.runtime.EventsOn("open_settings_from_tray", () => {
            openSettings();
        });
    };

    function hideAll() {
        floatingView.style.display = 'none';
        contextMenu.style.display = 'none';
        settingsView.style.display = 'none';
        resultView.style.display = 'none';
    }

    async function showContextMenu(event) {
        event.preventDefault();
        hideAll();
        contextMenu.style.display = 'flex';
        await window.runtime.WindowSetSize(150, 160);
    }

    async function closeContextMenu() {
        hideAll();
        floatingView.style.display = 'flex';
        await window.runtime.WindowSetSize(60, 60);
    }

    function toggleConfig() {
        const svc = document.getElementById('translator-service').value;
        document.getElementById('bing-config').style.display = (svc === 'Microsoft Bing') ? 'block' : 'none';
        document.getElementById('openai-config').style.display = (svc === 'OpenAI') ? 'block' : 'none';
    }

    async function openSettings() {
        hideAll();
        settingsView.style.display = 'flex';
        document.getElementById('translator-service').value = currentTranslator;
        document.getElementById('ocr-lang-setting').value = currentOcrLang;
        document.getElementById('target-lang-setting').value = currentTargetLang;
        
        document.getElementById('openai-endpoint').value = openaiEndpoint;
        document.getElementById('openai-key').value = openaiKey;
        document.getElementById('openai-model').value = openaiModel;
        
        toggleConfig();

        await window.runtime.WindowSetSize(400, 540);
        await window.runtime.WindowCenter();
    }

    async function saveSettingsAndClose() {
        currentTranslator = document.getElementById('translator-service').value;
        currentOcrLang = document.getElementById('ocr-lang-setting').value;
        currentTargetLang = document.getElementById('target-lang-setting').value;
        
        openaiEndpoint = document.getElementById('openai-endpoint').value || "https://api.openai.com/v1/chat/completions";
        openaiKey = document.getElementById('openai-key').value;
        openaiModel = document.getElementById('openai-model').value || "gpt-3.5-turbo";
        
        // 永久保存到用户的系统配置文件夹中 (~/.config/jietu/config.json)
        const configJSON = JSON.stringify({
            translator: currentTranslator,
            ocrLang: currentOcrLang,
            targetLang: currentTargetLang,
            openaiEndpoint: openaiEndpoint,
            openaiKey: openaiKey,
            openaiModel: openaiModel
        });
        await window.go.backend.App.SaveConfig(configJSON);
        
        hideAll();
        floatingView.style.display = 'flex';
        await window.runtime.WindowSetSize(60, 60);
    }

    async function openTextTranslator() {
        hideAll();
        
        // 设置 UI 为文本输入模式
        originalText.readOnly = false;
        originalText.value = "";
        originalText.placeholder = "在此输入或粘贴需要翻译的文本...";
        translatedText.value = "";
        
        windowTitle.innerText = "文本输入翻译";
        document.getElementById('btn-translate-text').style.display = 'inline-flex';

        resultView.style.display = 'flex';
        await window.runtime.WindowSetSize(580, 380);
        await window.runtime.WindowCenter();
        await window.runtime.WindowShow();
        
        originalText.focus();
    }

    async function doTextTranslation() {
        const text = originalText.value.trim();
        if (!text) return;
        
        translatedText.value = "正在请求翻译引擎，请稍候...";
        document.getElementById('btn-translate-text').disabled = true;
        
        try {
            const translation = await window.go.backend.App.TranslateText(
                text, 'auto', currentTargetLang, 
                currentTranslator, openaiKey, openaiEndpoint, openaiModel
            );
            translatedText.value = translation || "翻译失败或无结果";
        } catch (err) {
            console.error(err);
            translatedText.value = "发生错误:\n\n" + err;
        } finally {
            document.getElementById('btn-translate-text').disabled = false;
        }
    }

    async function startProcess() {
        if (floatingView.classList.contains('processing')) return;
        floatingView.classList.add('processing');

        try {
            await window.runtime.WindowHide();
            const imagePath = await window.go.backend.App.CaptureSelection();
            if (!imagePath) {
                await window.runtime.WindowShow();
                floatingView.classList.remove('processing');
                return;
            }

            const text = await window.go.backend.App.RecognizeText(imagePath, currentOcrLang);
            if (!text) {
                await window.runtime.WindowShow();
                floatingView.classList.remove('processing');
                return; 
            }

            const translation = await window.go.backend.App.TranslateText(
                text, 'auto', currentTargetLang, 
                currentTranslator, openaiKey, openaiEndpoint, openaiModel
            );

            // 恢复 UI 为只读截图模式
            originalText.readOnly = true;
            originalText.placeholder = "";
            document.getElementById('btn-translate-text').style.display = 'none';

            originalText.value = text;
            translatedText.value = translation || "翻译失败或无结果";
            
            const ocrLangName = currentOcrLang === 'eng' ? '英文' : '中文';
            const targetLangName = currentTargetLang === 'zh-CN' ? '中文' : '英文';
            windowTitle.innerText = `[截图OCR] ${ocrLangName} ➔ ${targetLangName}`;
            
            hideAll();
            resultView.style.display = 'flex';
            await window.runtime.WindowSetSize(580, 380);
            await window.runtime.WindowCenter();
            await window.runtime.WindowShow();

        } catch (err) {
            console.error(err);
            originalText.value = "请求或处理异常";
            translatedText.value = "发生错误:\n\n" + err;
            windowTitle.innerText = "出错了";
            
            hideAll();
            resultView.style.display = 'flex';
            await window.runtime.WindowSetSize(580, 380);
            await window.runtime.WindowCenter();
            await window.runtime.WindowShow();
        } finally {
            floatingView.classList.remove('processing');
        }
    }

    async function closeResultView() {
        hideAll();
        floatingView.style.display = 'flex';
        await window.runtime.WindowSetSize(60, 60);
    }
</script>
</body>
</html>
